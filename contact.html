<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contato - AmarEla</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="icon" type="image/png" href="imgs/favicon.png?v=2" />
  <link rel="apple-touch-icon" href="imgs/favicon.png?v=2" />
  <link rel="stylesheet" href="style.css" />

</head>
<body>

  <header class="site-header">
    <div class="max-w-6xl mx-auto px-4 md:px-8 flex justify-between items-center h-16">
      <a href="index.html" class="flex items-center gap-2 group">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-7 h-7 text-yellow-500 group-hover:text-yellow-600 transition-colors" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
        <span class="text-xl font-bold text-yellow-800 tracking-tight">AmarEla</span>
      </a>
      <button id="menuBtn" class="md:hidden text-stone-600 hover:text-yellow-600 focus:outline-none z-50 p-1">
        <svg id="iconHam" xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/></svg>
        <svg id="iconX" xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
      </button>
      <nav id="menu" class="hidden md:flex flex-col md:flex-row md:gap-1 absolute md:static top-16 left-0 w-full md:w-auto bg-white md:bg-transparent border-b md:border-0 border-yellow-100 shadow-md md:shadow-none z-40 px-4 pb-4 md:p-0">
        <a href="index.html" class="flex items-center gap-2 px-3 py-2 rounded-lg text-stone-700 hover:text-yellow-700 hover:bg-yellow-50 font-medium text-sm transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          Início
        </a>
        <a href="about.html" class="flex items-center gap-2 px-3 py-2 rounded-lg text-stone-700 hover:text-yellow-700 hover:bg-yellow-50 font-medium text-sm transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>
          Sobre
        </a>
        <a href="contact.html" class="flex items-center gap-2 px-3 py-2 rounded-lg text-yellow-700 bg-yellow-50 font-semibold text-sm">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.2 8.4c.5.38.8.97.8 1.6v10a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V10a2 2 0 0 1 .8-1.6l8-6a2 2 0 0 1 2.4 0l8 6Z"/><path d="m22 10-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 10"/></svg>
          Contato
        </a>
      </nav>
    </div>
  </header>

  <!-- Conteúdo principal -->
  <main class="max-w-2xl mx-auto mt-12 mb-16 px-4">
    <h1 class="text-3xl font-bold mb-2 text-stone-900">Contato</h1>
    <p class="text-xs font-semibold tracking-widest uppercase text-yellow-600 mb-6">Fale com a gente</p>

    <p class="mb-6 text-stone-600">
      Tem uma dúvida, sugestão ou deseja reportar algo? Preencha o formulário abaixo ou fale connosco pelo Instagram.
    </p>

    <a href="https://www.instagram.com/lista.amarela" target="_blank" rel="noopener noreferrer" class="inline-flex items-center gap-2 bg-white border border-stone-200 hover:border-yellow-300 hover:bg-yellow-50 text-stone-700 hover:text-yellow-700 font-medium text-sm px-4 py-2.5 rounded-xl transition-colors mb-8 shadow-sm">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-yellow-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="20" x="2" y="2" rx="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>
      @lista.amarela no Instagram
    </a>

    <form action="https://formsubmit.co/kakacordovil@gmail.com" method="POST" class="space-y-4 mt-6 bg-white p-8 rounded-2xl border border-stone-100 shadow-sm">
      <input type="hidden" name="_next" value="https://amarela.vercel.app/email-confirmation.html">
      <input type="hidden" name="_captcha" value="false">

      <div>
        <label for="nome" class="block text-sm font-medium text-stone-700">Nome</label>
        <input type="text" id="nome" name="nome" required class="form-input mt-1">
      </div>

      <div>
        <label for="email" class="block text-sm font-medium text-stone-700">Email</label>
        <input type="email" id="email" name="email" required class="form-input mt-1">
      </div>

      <div>
        <label for="assunto" class="block text-sm font-medium text-stone-700">Assunto</label>
        <select id="assunto" name="assunto" required class="form-input mt-1">
          <option value="">Selecione</option>
          <option value="Reportar serviço">Reportar serviço</option>
          <option value="Sugestão">Sugestão</option>
          <option value="Parceria">Parceria</option>
          <option value="Outro">Outro</option>
        </select>
      </div>

      <div>
        <label for="mensagem" class="block text-sm font-medium text-stone-700">Mensagem</label>
        <textarea id="mensagem" name="mensagem" rows="5" required class="form-input mt-1"></textarea>
      </div>

      <button type="submit" class="btn-primary">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2 11 13"/><path d="m22 2-7 20-4-9-9-4 20-7z"/></svg>
        Enviar mensagem
      </button>
    </form>

    <!-- Mensagem de confirmação -->
    <div id="confirmacao" class="mt-6">
      <script>
        if (window.location.search.includes('enviado=true')) {
          document.getElementById("confirmacao").innerHTML = "<p class='text-green-600 text-lg font-medium'>Mensagem enviada com sucesso. Obrigada por entrar em contato! 💛</p>";
        }
      </script>
    </div>
  </main>

  <footer class="site-footer py-8 px-4 text-center">
    <div class="max-w-6xl mx-auto">
      <div class="flex items-center justify-center gap-2 mb-3">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-yellow-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
        <span class="text-white font-semibold">AmarEla</span>
      </div>
      <div class="flex items-center justify-center gap-4 mb-3">
        <a href="https://www.instagram.com/lista.amarela" target="_blank" rel="noopener noreferrer" class="flex items-center gap-1.5 text-stone-400 hover:text-yellow-400 transition-colors text-xs font-medium">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="20" x="2" y="2" rx="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>
          @lista.amarela
        </a>
      </div>
      <p class="text-stone-400 text-xs">
        Idealizado por <a href="https://github.com/kakacordovil" class="font-medium">Ká Cordovil</a> com a força de todas que vieram antes.
      </p>
    </div>
  </footer>
  <script src="menu.js"></script>
</body>
</html>
